<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARK MINJI | Level Design Portfolio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <style>
        body {
            font-family: "Pretendard", sans-serif;
            letter-spacing: -0.03em;
            background-color: #fff;
            color: #1f2937;
        }

        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            background: #fff;
            z-index: 50;
            border-right: 1px solid #f3f4f6;
        }

        .main-content {
            margin-left: 280px;
            min-height: 100vh;
        }

        .page-section {
            display: none;
            width: 100%;
        }

            .page-section.active {
                display: block;
                animation: fadeIn 0.2s ease-in-out;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* 세부페이지 상단 대형 이미지 (Hero) */
        .project-hero {
            width: 100%;
            height: 65vh;
            background-size: cover;
            background-position: center;
            border-radius: 2.5rem;
            margin-bottom: 5rem;
            cursor: zoom-in;
        }

        /* 슬라이더 커스텀 (외부 버튼 및 썸네일) */
        .slider-outer {
            position: relative;
            padding: 0 80px;
            margin-bottom: 3rem;
        }

        .slider-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .slider-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide {
            min-width: 100%;
            aspect-ratio: 16 / 9;
            background-size: cover;
            background-position: center;
            cursor: zoom-in;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: #f3f4f6;
            border-radius: 15px;
            display: flex;
            items-center;
            justify-content: center;
            font-weight: bold;
            color: #9ca3af;
            transition: all 0.2s;
            z-index: 10;
        }

            .nav-btn:hover {
                background: #111;
                color: #fff;
            }

            .nav-btn.prev {
                left: 0;
            }

            .nav-btn.next {
                right: 0;
            }

        /* 하단 인디케이터 및 썸네일 */
        .indicator-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .indicator-item {
            width: 12px;
            height: 6px;
            background: #e5e7eb;
            border-radius: 2px;
            transition: all 0.3s;
            cursor: pointer;
        }

            .indicator-item.active {
                background: #0d9488;
                width: 30px;
            }

        .thumb-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .thumb-item {
            width: 60px;
            height: 35px;
            border-radius: 4px;
            overflow: hidden;
            opacity: 0.4;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
        }

            .thumb-item.active {
                opacity: 1;
                border-color: #0d9488;
                transform: scale(1.1);
            }

            .thumb-item img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        /* 확대 모달 */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        #modal-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 0.5rem;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 3rem;
            cursor: pointer;
            opacity: 0.3;
            transition: 0.2s;
            padding: 20px;
        }

            .modal-nav:hover {
                opacity: 1;
            }

        .modal-prev {
            left: 20px;
        }

        .modal-next {
            right: 20px;
        }

        @media (max-width: 1024px) {
            .sidebar {
                position: relative;
                height: auto;
                width: 100%;
                border-right: none;
            }

            .main-content {
                margin-left: 0;
            }

            .slider-outer {
                padding: 0 40px;
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar w-[280px] p-8">
        <div class="mb-12">
            <button onclick="showPage('home')" class="text-left hover:opacity-70 transition-opacity outline-none">
                <h1 class="text-xl font-black tracking-tighter">PARK MINJI</h1>
                <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest font-bold">Level Designer</p>
            </button>
        </div>

        <nav class="space-y-8 text-[12px]">
            <div>
                <h2 class="font-bold text-gray-900 mb-2 text-xs">레벨 디자인</h2>
                <ul class="space-y-1 text-gray-500">
                    <li><button onclick="showPage('watatsumi')" class="hover:text-teal-600 outline-none text-left">원신 와타츠미섬 역기획 (2026)</button></li>
                </ul>
            </div>

            <div>
                <h2 class="font-bold text-gray-900 mb-2 text-xs">수상내역</h2>
                <ul class="space-y-1 text-gray-500">
                    <li><button onclick="showPage('award-nexon')" class="hover:text-teal-600 outline-none text-left leading-tight">넥슨 대학생 게임잼 '재밌넥' 최우수상 (2024)</button></li>
                    <li><button onclick="showPage('award-mentoring')" class="hover:text-teal-600 outline-none text-left leading-tight">넥슨 메이플 대학생 멘토링 '메토링' 최우수상 (2025)</button></li>
                </ul>
            </div>

            <div>
                <h2 class="font-bold text-gray-900 mb-2 text-xs">인디 프로젝트</h2>
                <div class="space-y-4">
                    <div>
                        <p class="text-[9px] text-gray-400 mb-1 font-bold uppercase tracking-widest">* 2023</p>
                        <ul class="space-y-1 pl-2 border-l border-gray-100">
                            <li><button onclick="showPage('catch-memory')" class="hover:text-teal-600 outline-none">캐치 메모리!</button></li>
                            <li><button onclick="showPage('save-alba')" class="hover:text-teal-600 outline-none">구해줘! 알바생</button></li>
                            <li><button onclick="showPage('be-kind')" class="hover:text-teal-600 outline-none">착하게 살자</button></li>
                            <li><button onclick="showPage('modem-space')" class="hover:text-teal-600 outline-none">모뎀 스페이스</button></li>
                        </ul>
                    </div>
                    <div>
                        <p class="text-[9px] text-gray-400 mb-1 font-bold uppercase tracking-widest">* 2024</p>
                        <ul class="space-y-1 pl-2 border-l border-gray-100">
                            <li><button onclick="showPage('rifa')" class="hover:text-teal-600 outline-none">RIFA</button></li>
                            <li><button onclick="showPage('dream-pals')" class="hover:text-teal-600 outline-none">Dream Pals</button></li>
                            <li><button onclick="showPage('pearl-rush')" class="hover:text-teal-600 outline-none">Pearl Rush</button></li>
                        </ul>
                    </div>
                </div>
            </div>


            <div>
                <h2 class="font-bold text-gray-900 mb-2 text-xs">STUDY</h2>
                <ul class="space-y-1 text-gray-500">
                    <li><button onclick="showPage('mabi')" class="hover:text-teal-600 outline-none">마비노기 모바일</button></li>
                    <li><button onclick="showPage('potal')" class="hover:text-teal-600 outline-none">포탈</button></li>
                    <li><button onclick="showPage('gdc01')" class="hover:text-teal-600 outline-none">GDC 영상:갓오브워 레벨디자인</button></li>


                </ul>
            </div>



            <div>
                <h2 class="font-bold text-gray-900 mb-2 text-xs">전시 기획</h2>
                <ul class="space-y-1 text-gray-500">
                    <li><button onclick="showPage('unphysical')" class="hover:text-teal-600 outline-none">《언피지컬 리듬》 (2024)</button></li>
                    <li><button onclick="showPage('autosave')" class="hover:text-teal-600 outline-none">《Autosave_》 (2025)</button></li>
                </ul>
            </div>

            <div class="pt-2">
                <button onclick="showPage('aboutme')" class="font-bold text-gray-900 hover:text-teal-600 text-xs outline-none">About Me</button>
                <ul class="space-y-1 text-gray-500">
                    <li><button onclick="showPage('unphysical')" class="hover:text-teal-600 outline-none">플레이 게임 이력</button></li>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <section id="home" class="page-section active">
            <div class="h-screen flex flex-col justify-center px-10 md:px-20 text-white" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://cnozv.github.io/genshin01.png'); background-size: cover; background-position: center;">
                <h3 class="text-teal-400 font-bold text-sm mb-4 uppercase tracking-[0.3em]">Level Design Portfolio</h3>
                <h2 class="text-7xl font-black leading-tight mb-8">레벨디자이너<br>박민지</h2>
                <button onclick="showPage('watatsumi')" class="w-fit px-10 py-5 bg-teal-500 rounded-full font-bold uppercase tracking-widest hover:bg-teal-400 transition-all">View Projects →</button>
            </div>
        </section>

        <script>
            const genshinImages = Array.from({ length: 9 }, (_, i) => `https://cnozv.github.io/genshin0${i + 1}.png`);
            const allPageIds = ['watatsumi', 'catch-memory', 'save-alba', 'be-kind', 'modem-space', 'rifa', 'dream-pals', 'pearl-rush', 'trombone', 'unphysical', 'autosave', 'study', 'award-nexon', 'award-mentoring'];
            const pageTitles = {
                'watatsumi': '원신 와타츠미섬 역기획 (2026)',
                'award-nexon': '넥슨 대학생 게임잼 \'재밌넥\' 최우수상 (2024)',
                'award-mentoring': '넥슨 대학생 멘토링 \'메토링\' 2기 최우수상',
                'catch-memory': '캐치 메모리! (2023)', 'rifa': 'RIFA (2024)', 'pearl-rush': 'Pearl Rush (2024)'
            };

            allPageIds.forEach(id => {
                const title = pageTitles[id] || id.toUpperCase();
                document.write(`
                            <section id="${id}" class="page-section p-10 md:p-20">
                                <div class="max-w-6xl mx-auto">
                                    <h2 class="text-5xl font-black mb-12 tracking-tighter text-gray-900">${title}</h2>
                                    <div class="mb-24">
                                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-[0.4em] mb-10 text-center md:text-left">Gameplay Movie</h3>
                                        <div class="aspect-video w-full rounded-[2.5rem] overflow-hidden shadow-2xl">
                                            <iframe class="w-full h-full" src="https://www.youtube.com/embed/H56CziHbRQo" frameborder="0" allowfullscreen></iframe>
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-20 mb-24 py-20 border-y border-gray-100">
                                        <div>
                                            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-[0.4em] mb-10">Project Details</h3>
                                            <ul class="space-y-5 text-sm">
                                                <li class="flex gap-6"><span class="font-bold w-24 text-gray-400">장르</span> <span>3인칭 오픈월드 ARPG</span></li>
                                                <li class="flex gap-6"><span class="font-bold w-24 text-gray-400">엔진</span> <span>Unreal 엔진 5.6</span></li>
                                                <li class="flex gap-6"><span class="font-bold w-24 text-gray-400">맵 사이즈</span> <span>1100m * 700m * 200m</span></li>
                                                <li class="flex gap-6"><span class="font-bold w-24 text-gray-400">테마</span> <span>산호, 조개, 진주빛의 몽환적인 섬</span></li>
                                                <li class="flex gap-6"><span class="font-bold w-24 text-gray-400">목적</span> <span>몽환적인 섬</span></li>
                                                <li class="flex gap-6"><span class="font-bold w-24 text-gray-400">제작기간</span> <span>2026.01. ~ 2026.03. (2개월)</span></li>


                                            </ul>
                                        </div>
                                        <div class="text-gray-600 leading-relaxed">
                                            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-[0.4em] mb-10">Overview</h3>
                                            <p>원신 와타츠미섬 지역, 월드퀘스트 '월광욕 연못' 역기획 영상입니다. 어쩌구저쩌구 설명 </p>
                                        </div>
                                    </div>

                                    <div class="mb-24">
                                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-[0.4em] mb-10">Detail Screenshots</h3>
                                        <div class="slider-outer">
                                            <button onclick="moveSlide(-1)" class="nav-btn prev">←</button>
                                            <div class="slider-container">
                                                <div class="slider-track" id="${id}-slider">
                                                    ${genshinImages.map((src, idx) => `<div class="slide" onclick="openZoom(${idx})" style="background-image: url('${src}');"></div>`).join('')}
                                                </div>
                                            </div>
                                            <button onclick="moveSlide(1)" class="nav-btn next">→</button>
                                            <div class="indicator-bar" id="${id}-indicators"></div>
                                            <div class="thumb-bar" id="${id}-thumbs">
                                                ${genshinImages.map((src, idx) => `<div class="thumb-item" onclick="jumpToSlide(${idx})"><img src="${src}"></div>`).join('')}
                                            </div>
                                        </div>
                                    </div>

                                    <div class="w-full h-[800px] rounded-[2.5rem] border border-gray-100 overflow-hidden shadow-2xl mb-10">
                                        <iframe src="https://cnozv.github.io/rifa.pdf" class="w-full h-full" frameborder="0"></iframe>
                                    </div>
                                </div>
                            </section>
                        `);
            });
        </script>

        <section id="aboutme" class="page-section p-10 md:p-20">
            <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-24 items-center min-h-[80vh]">
                <div class="w-80 h-80 bg-gray-900 rounded-[3rem] shrink-0 shadow-2xl overflow-hidden">
                    <img src="https://cnozv.github.io/genshin01.png" class="w-full h-full object-cover opacity-50">
                </div>
                <div class="space-y-6">
                    <p class="text-4xl font-black text-gray-900">박민지 | 레벨 디자이너 지망생</p>
                    <p class="text-gray-500 text-xl leading-relaxed">어쩌구저쩌구 자기소개.</p>
                </div>
            </div>
        </section>
    </main>

    <div id="modal" onclick="closeZoom()">
        <span class="modal-nav modal-prev" onclick="event.stopPropagation(); moveModal(-1)">&#10094;</span>
        <img id="modal-img" src="">
        <span class="modal-nav modal-next" onclick="event.stopPropagation(); moveModal(1)">&#10095;</span>
    </div>

    <script>
        let currentIdx = 0;
        let slideTimer;
        const total = 9;

        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) { target.classList.add('active'); window.scrollTo(0, 0); resetSlider(); }
        }

        function resetSlider() {
            currentIdx = 0;
            updateUI();
            startTimer();
        }

        function updateUI() {
            const activePage = document.querySelector('.page-section.active');
            if (!activePage || activePage.id === 'home' || activePage.id === 'aboutme') return;

            const track = document.getElementById(`${activePage.id}-slider`);
            if (track) track.style.transform = `translateX(-${currentIdx * 100}%)`;

            activePage.querySelectorAll('.indicator-item').forEach((item, i) => item.classList.toggle('active', i === currentIdx));
            activePage.querySelectorAll('.thumb-item').forEach((item, i) => item.classList.toggle('active', i === currentIdx));

            if (document.getElementById('modal').style.display === 'flex') {
                document.getElementById('modal-img').src = `https://cnozv.github.io/genshin0${currentIdx + 1}.png`;
            }
        }

        function moveSlide(dir) { currentIdx = (currentIdx + dir + total) % total; updateUI(); startTimer(); }
        function jumpToSlide(idx) { currentIdx = idx; updateUI(); startTimer(); }
        function startTimer() { clearInterval(slideTimer); slideTimer = setInterval(() => moveSlide(1), 3000); }

        function openZoom(idx) {
            currentIdx = idx;
            document.getElementById('modal').style.display = 'flex';
            updateUI();
            clearInterval(slideTimer);
        }

        function closeZoom() { document.getElementById('modal').style.display = 'none'; startTimer(); }
        function moveModal(dir) { currentIdx = (currentIdx + dir + total) % total; updateUI(); }

        window.onload = () => {
            document.querySelectorAll('.indicator-bar').forEach(bar => {
                for (let i = 0; i < total; i++) {
                    const dot = document.createElement('div');
                    dot.className = `indicator-item ${i === 0 ? 'active' : ''}`;
                    dot.onclick = () => jumpToSlide(i);
                    bar.appendChild(dot);
                }
            });
            startTimer();
        };

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('modal').style.display === 'flex') {
                if (e.key === 'ArrowLeft') moveModal(-1);
                if (e.key === 'ArrowRight') moveModal(1);
                if (e.key === 'Escape') closeZoom();
            }
        });
    </script>
</body>
</html>
