<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARK MINJI | Level Design Portfolio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <style>
        body {
            font-family: "Pretendard", sans-serif;
            letter-spacing: -0.03em;
            background-color: #fff;
            color: #1f2937;
        }

        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            background: #fff;
            z-index: 50;
            border-right: 1px solid #f3f4f6;
        }

        .main-content {
            margin-left: 280px;
            min-height: 100vh;
        }

        .page-section {
            display: none;
            width: 100%;
        }

            .page-section.active {
                display: block;
                animation: fadeIn 0.2s ease-in-out;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* --- 슬라이더 커스텀 --- */
        .slider-outer {
            position: relative;
            padding: 0 80px;
            margin-top: 2rem;
        }

        .slider-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 2.5rem;
            shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
        }

        .slider-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide {
            min-width: 100%;
            aspect-ratio: 16 / 9;
            background-size: cover;
            background-position: center;
            cursor: zoom-in;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 56px;
            height: 56px;
            background: #f9fafb;
            border: 1px solid #f3f4f6;
            border-radius: 100%;
            display: flex;
            items-center;
            justify-content: center;
            font-size: 1.25rem;
            color: #9ca3af;
            transition: all 0.3s;
            z-index: 10;
            cursor: pointer;
        }

            .slider-btn:hover {
                background: #111;
                color: #fff;
                transform: translateY(-50%) scale(1.1);
            }

        .btn-prev {
            left: 0;
        }

        .btn-next {
            right: 0;
        }

        /* 인디케이터 바 */
        .indicator-bar {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 24px;
        }

        .indicator-item {
            width: 20px;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            transition: all 0.4s;
            cursor: pointer;
        }

            .indicator-item.active {
                background: #0d9488;
                width: 40px;
            }

        /* 썸네일 바 스타일 */
        .thumbnail-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding: 0 10px;
        }

        .thumb-item {
            width: 80px;
            height: 45px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.3s;
            filter: grayscale(1);
        }

            .thumb-item:hover {
                opacity: 0.8;
            }

            .thumb-item.active {
                border-color: #0d9488;
                opacity: 1;
                filter: grayscale(0);
                transform: scale(1.1);
            }

            .thumb-item img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        /* 이미지 확대 모달 */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        #modal-img {
            max-width: 85%;
            max-height: 85%;
            border-radius: 0.5rem;
            shadow: 0 0 60px rgba(0,0,0,0.5);
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: background 0.2s;
            cursor: pointer;
        }

            .modal-nav:hover {
                background: rgba(255,255,255,0.2);
            }

        .modal-prev {
            left: 30px;
        }

        .modal-next {
            right: 30px;
        }

        .modal-close {
            position: absolute;
            top: 30px;
            right: 30px;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            opacity: 0.5;
        }

            .modal-close:hover {
                opacity: 1;
            }

        @media (max-width: 1024px) {
            .sidebar {
                position: relative;
                height: auto;
                width: 100%;
                border-right: none;
            }

            .main-content {
                margin-left: 0;
            }

            .slider-outer {
                padding: 0;
            }

            .slider-btn, .modal-nav {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-white text-gray-800">

    <aside class="sidebar w-[280px] p-8">
        <div class="mb-10">
            <button onclick="showPage('home')" class="text-left hover:opacity-70 transition-opacity outline-none">
                <h1 class="text-xl font-black tracking-tighter">PARK MINJI</h1>
                <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest font-bold">Level Designer</p>
            </button>
        </div>
        <nav class="space-y-8 text-[12px]">
            <div>
                <h2 class="font-bold text-gray-900 mb-2 text-xs">1. 레벨디자인</h2>
                <ul class="space-y-1 text-gray-500">
                    <li><button onclick="showPage('watatsumi')" class="hover:text-teal-600 outline-none text-left">원신 와타츠미섬 역기획 (2026)</button></li>
                </ul>
            </div>
            <div>
                <h2 class="font-bold text-gray-900 mb-2 text-xs">5. 수상</h2>
                <ul class="space-y-1 text-gray-500">
                    <li><button onclick="showPage('award-nexon')" class="hover:text-teal-600 outline-none text-left leading-tight">넥슨 대학생 게임잼 '재밌넥' 최우수상 (2024)</button></li>
                    <li><button onclick="showPage('award-mentoring')" class="hover:text-teal-600 outline-none text-left leading-tight">넥슨 대학생 멘토링 '메토링' 2기 최우수상</button></li>
                </ul>
            </div>
            <div class="pt-2">
                <button onclick="showPage('aboutme')" class="font-bold text-gray-900 hover:text-teal-600 text-xs outline-none">6. About Me</button>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <section id="home" class="page-section active">
            <div class="home-bg" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://cnozv.github.io/genshin01.png'); background-size: cover; background-position: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 10%;">
                <div class="max-w-3xl text-white">
                    <h2 class="text-7xl font-black mb-8">레벨디자이너<br>박민지</h2>
                    <button onclick="showPage('watatsumi')" class="px-10 py-5 bg-teal-500 rounded-full font-bold uppercase tracking-widest shadow-2xl hover:bg-teal-400 transition-all">Explore Work</button>
                </div>
            </div>
        </section>

        <section id="watatsumi" class="page-section p-10 md:p-20">
            <div class="max-w-6xl mx-auto">
                <h2 class="text-5xl font-black mb-16 tracking-tighter text-gray-900">원신 이나즈마 와타츠미섬 역기획 (2026)</h2>

                <div class="slider-outer">
                    <button onclick="moveSlide(-1)" class="slider-btn btn-prev">←</button>
                    <div class="slider-container">
                        <div class="slider-track" id="watatsumi-slider">
                        </div>
                    </div>
                    <button onclick="moveSlide(1)" class="slider-btn btn-next">→</button>

                    <div class="indicator-bar" id="slider-indicators"></div>

                    <div class="thumbnail-bar" id="thumbnail-box"></div>

                    <p class="text-center mt-6 text-[11px] font-bold text-gray-300 uppercase tracking-widest" id="slide-number">1 / 9</p>
                </div>

                <div class="mt-32 space-y-24">
                    <div class="aspect-video w-full rounded-[2.5rem] overflow-hidden shadow-2xl">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/WGvM_FdMuak" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="w-full h-[850px] rounded-[2.5rem] border border-gray-100 overflow-hidden shadow-2xl">
                        <iframe src="https://cnozv.github.io/rifa.pdf" class="w-full h-full" frameborder="0"></iframe>
                    </div>
                </div>
            </div>
        </section>

        <section id="aboutme" class="page-section p-20">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-3xl font-black mb-8">About Me</h2>
                <p class="text-gray-500 leading-relaxed text-lg">
                    경기도에 거주하며 성실함을 바탕으로 데브시스터즈 입사를 꿈꾸는 레벨 디자이너 박민지입니다.
                </p>
            </div>
        </section>
    </main>

    <div id="modal">
        <span class="modal-close" onclick="closeZoom()">&times;</span>
        <button class="modal-nav modal-prev" onclick="moveModalSlide(-1)">&#10094;</button>
        <img id="modal-img" src="" alt="Zoomed view">
        <button class="modal-nav modal-next" onclick="moveModalSlide(1)">&#10095;</button>
    </div>

    <script>
        const imgUrls = Array.from({ length: 9 }, (_, i) => `https://cnozv.github.io/genshin0${i + 1}.png`);
        let currentIdx = 0;
        let slideTimer;

        // 초기화
        window.onload = () => {
            const track = document.getElementById('watatsumi-slider');
            const indicators = document.getElementById('slider-indicators');
            const thumbs = document.getElementById('thumbnail-box');

            imgUrls.forEach((url, i) => {
                // 슬라이드 생성
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.style.backgroundImage = `url('${url}')`;
                slide.onclick = () => openZoom(i);
                track.appendChild(slide);

                // 인디케이터 생성
                const dot = document.createElement('div');
                dot.className = `indicator-item ${i === 0 ? 'active' : ''}`;
                dot.onclick = () => jumpToSlide(i);
                indicators.appendChild(dot);

                // 썸네일 생성
                const thumb = document.createElement('div');
                thumb.className = `thumb-item ${i === 0 ? 'active' : ''}`;
                thumb.innerHTML = `<img src="${url}">`;
                thumb.onclick = () => jumpToSlide(i);
                thumbs.appendChild(thumb);
            });
            startTimer();
        };

        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) { target.classList.add('active'); window.scrollTo(0, 0); }
        }

        function updateSliderUI() {
            const track = document.getElementById('watatsumi-slider');
            track.style.transform = `translateX(-${currentIdx * 100}%)`;

            document.querySelectorAll('.indicator-item').forEach((item, idx) => item.classList.toggle('active', idx === currentIdx));
            document.querySelectorAll('.thumb-item').forEach((item, idx) => item.classList.toggle('active', idx === currentIdx));
            document.getElementById('slide-number').innerText = `${currentIdx + 1} / 9`;

            // 모달 열려있으면 이미지 갱신
            const modalImg = document.getElementById('modal-img');
            if (document.getElementById('modal').style.display === 'flex') {
                modalImg.src = imgUrls[currentIdx];
            }
        }

        function moveSlide(direction) {
            currentIdx = (currentIdx + direction + imgUrls.length) % imgUrls.length;
            updateSliderUI();
            resetTimer();
        }

        function jumpToSlide(idx) {
            currentIdx = idx;
            updateSliderUI();
            resetTimer();
        }

        function startTimer() { slideTimer = setInterval(() => moveSlide(1), 3000); }
        function resetTimer() { clearInterval(slideTimer); startTimer(); }

        // 모달 기능
        function openZoom(index) {
            currentIdx = index;
            const modal = document.getElementById('modal');
            document.getElementById('modal-img').src = imgUrls[currentIdx];
            modal.style.display = 'flex';
            clearInterval(slideTimer);
            updateSliderUI();
        }

        function closeZoom() {
            document.getElementById('modal').style.display = 'none';
            startTimer();
        }

        function moveModalSlide(direction) {
            currentIdx = (currentIdx + direction + imgUrls.length) % imgUrls.length;
            updateSliderUI();
        }

        // 키보드 제어
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('modal').style.display === 'flex') {
                if (e.key === 'ArrowLeft') moveModalSlide(-1);
                if (e.key === 'ArrowRight') moveModalSlide(1);
                if (e.key === 'Escape') closeZoom();
            }
        });
    </script>
</body>
</html>
